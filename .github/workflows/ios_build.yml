name: build ios ipa
on: [push]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: build process
        run: |
          npm install
          npx cap init "elevator" "com.game.elevator" --web-dir .
          npx cap add ios
          npx cap copy ios
          xcodebuild -workspace ios/App/App.xcworkspace -scheme App -configuration Release -sdk iphoneos -derivedDataPath build CODE_SIGNING_ALLOWED=NO
      - name: package ipa
        run: |
          mkdir Payload
          cp -r build/Build/Products/Release-iphoneos/App.app Payload/
          zip -r elevator.ipa Payload
      - name: upload
        uses: actions/upload-artifact@v3
        with:
          name: game-ipa
          path: elevator.ipa
